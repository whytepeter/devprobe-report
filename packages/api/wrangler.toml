name = "devprobe-api"
main = "src/index.ts"
compatibility_date = "2024-10-22"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[r2_buckets]]
binding = "ASSETS"
bucket_name = "devprobe-storage"

[[queues.producers]]
binding = "AI_QUEUE"
queue = "deveprobe-ai"

[[queues.producers]]
binding = "INTEGRATION_QUEUE"
queue = "deveprobe-integrations"

[[queues.producers]]
binding = "NOTIFICATION_QUEUE"
queue = "deveprobe-notifications"

[[queues.consumers]]
queue = "deveprobe-ai"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3

[[queues.consumers]]
queue = "deveprobe-integrations"
max_batch_size = 5
max_batch_timeout = 10
max_retries = 5

[[queues.consumers]]
queue = "deveprobe-notifications"
max_batch_size = 20
max_batch_timeout = 5
max_retries = 3

# Rate-limit KV is wired up later when rate limiting lands. To enable:
#   1. wrangler kv namespace create RATE_LIMIT_KV
#   2. uncomment and paste the returned id below
#   3. add RATE_LIMIT_KV: KVNamespace back to Env
# [[kv_namespaces]]
# binding = "RATE_LIMIT_KV"
# id = ""

[env.development]
name = "devprobe-api"

[env.development.vars]
ENVIRONMENT = "development"
